<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0e9f8e"/>
<title>MiNegocio</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#f0faf8;color:#1a2e2b;font-family:'Trebuchet MS',sans-serif;min-height:100vh;}
input,textarea,select,button{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#e0f5f2;}
::-webkit-scrollbar-thumb{background:#0e9f8e;border-radius:2px;}
.inp{background:#fff;border:1.5px solid #b2e0da;border-radius:8px;padding:8px 12px;color:#1a2e2b;font-size:14px;outline:none;width:100%;transition:border-color .2s;}
.inp:focus{border-color:#0e9f8e;}
.card{background:#fff;border-radius:14px;padding:20px;border:1px solid #d0ede9;box-shadow:0 2px 8px rgba(14,159,142,.07);}
.btn-primary{background:#0e9f8e;color:#fff;border:none;border-radius:9px;padding:10px 20px;cursor:pointer;font-weight:700;font-size:14px;}
.btn-secondary{background:#e0f5f2;color:#0e9f8e;border:1.5px solid #b2e0da;border-radius:9px;padding:10px 16px;cursor:pointer;font-weight:600;font-size:14px;}
.btn-danger{background:#fff0f0;color:#e53935;border:1.5px solid #ffcdd2;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:12px;}
.btn-warn{background:#fff8e1;color:#f57c00;border:1.5px solid #ffe082;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:12px;}
.btn-green{background:#e8f5e9;color:#2e7d32;border:1.5px solid #c8e6c9;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:12px;}
.btn-teal{background:#e0f5f2;color:#0e9f8e;border:1.5px solid #b2e0da;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:12px;}
.btn-purple{background:#f3e5f5;color:#7b1fa2;border:1.5px solid #ce93d8;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:12px;}
.badge-red{background:#ffebee;color:#e53935;font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;}
.badge-orange{background:#fff8e1;color:#f57c00;font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;}
.badge-green{background:#e8f5e9;color:#2e7d32;font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;}
.badge-blue{background:#e3f2fd;color:#1565c0;font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;}
.badge-purple{background:#f3e5f5;color:#7b1fa2;font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;padding:14px;}
.modal-box{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(14,159,142,.15);}
.stat-card{background:#fff;border-radius:14px;padding:16px 18px;border:1px solid #d0ede9;box-shadow:0 2px 8px rgba(14,159,142,.07);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
table{width:100%;border-collapse:collapse;}
thead tr{background:#e0f5f2;}
th{padding:10px 12px;text-align:left;font-size:11px;color:#0e9f8e;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #e8f5f3;color:#1a2e2b;}
tr:hover td{background:#f5fffe;}
.tab-btn{padding:8px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap;}
.tab-btn.active{background:#0e9f8e;color:#fff;font-weight:700;}
.tab-btn.inactive{background:transparent;color:#5a8a84;}
.ticket-print{font-family:'Courier New',monospace;max-width:300px;margin:0 auto;padding:16px;background:#fff;color:#000;}
.ticket-print h2{text-align:center;font-size:15px;margin-bottom:2px;}
.ticket-print .sub{text-align:center;font-size:11px;color:#555;margin-bottom:10px;}
.ticket-print hr{border:none;border-top:1px dashed #aaa;margin:7px 0;}
.ticket-print .row{display:flex;justify-content:space-between;font-size:12px;margin:3px 0;}
.ticket-print .total-row{display:flex;justify-content:space-between;font-size:14px;font-weight:700;margin:4px 0;}
.ticket-print .footer{text-align:center;font-size:11px;color:#555;margin-top:8px;}
#scanner-container{position:relative;width:100%;max-width:360px;margin:0 auto;}
#scanner-video{width:100%;border-radius:12px;border:3px solid #0e9f8e;}
#scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
#scanner-line{width:80%;height:3px;background:rgba(14,159,142,.8);box-shadow:0 0 8px #0e9f8e;animation:scan-anim 1.8s ease-in-out infinite;}
@keyframes scan-anim{0%,100%{transform:translateY(-60px)}50%{transform:translateY(60px)}}
.barcode-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;}
.barcode-box{background:#fff;border-radius:18px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 8px 40px rgba(14,159,142,.25);}
@media print{#app-header,#app-nav-bar,#alert-banner,#main-content{display:none!important;}#print-area{display:block!important;}}
#print-area{display:none;}
@media(max-width:700px){
  .grid4{grid-template-columns:1fr 1fr;}
  .grid3{grid-template-columns:1fr 1fr;}
  .grid2{grid-template-columns:1fr;}
  .two-col{grid-template-columns:1fr!important;}
  .hide-mobile{display:none!important;}
  th,td{padding:7px 8px;font-size:12px;}
  .scroll-x{overflow-x:auto;}
}
</style>
</head>

/* ── navigation ── */
window.goTab=function(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.className='tab-btn inactive');
  if(btn)btn.className='tab-btn active';
  else{const tabs=['dashboard','inventory','sales','clients','creditos','gastos','compras','quotes','caja','reports'];
    const el=document.querySelectorAll('.tab-btn')[tabs.indexOf(tab)];if(el)el.className='tab-btn active';}
  set({tab});
};

function render(){
  try{renderBanner();}catch(e){console.error('Banner error',e);}
  const el=document.getElementById('main-content');
  const t=S.tab;
  try{
    if(t==='dashboard')el.innerHTML=rDashboard();
    else if(t==='inventory')el.innerHTML=rInventory();
    else if(t==='sales')el.innerHTML=rSales();
    else if(t==='clients')el.innerHTML=rClients();
    else if(t==='creditos')el.innerHTML=rCreditos();
    else if(t==='gastos')el.innerHTML=rGastos();
    else if(t==='compras')el.innerHTML=rCompras();
    else if(t==='quotes')el.innerHTML=rQuotes();
    else if(t==='caja')el.innerHTML=rCaja();
    else if(t==='reports')el.innerHTML=rReports();
  }catch(e){
    el.innerHTML='<div style="padding:20px;background:#fff0f0;border-radius:12px;color:#e53935;font-size:13px"><b>⚠️ Error en módulo '+t+':</b><br/>'+e.message+'</div>';
    console.error('Tab render error ('+t+'):', e);
  }
  // scanner modal
  let sm=document.getElementById('barcode-modal-bg');
  if(S.scannerOpen&&!sm){const d=document.createElement('div');d.innerHTML=renderScannerModal();document.body.appendChild(d.firstElementChild);setTimeout(()=>startCamera(),300);}
  else if(!S.scannerOpen&&sm)sm.remove();
}

function renderBanner(){
  const cr=S.products.filter(p=>p.stock===0),lw=S.products.filter(p=>p.stock>0&&p.stock<=p.minStock);
  // expiry alerts
  const soon=S.products.filter(p=>{if(!p.expiry)return false;const d=daysDiff(today(),p.expiry);return d>=0&&d<=30;});
  const expired=S.products.filter(p=>p.expiry&&daysDiff(today(),p.expiry)<0);
  // overdue credits
  const overdue=S.creditos.filter(c=>c.status!=='pagado'&&c.dueDate<today());
  const el=document.getElementById('alert-banner');
  const msgs=[];
  if(cr.length)msgs.push(`🚨 ${cr.length} agotado(s)`);
  if(lw.length)msgs.push(`⚠️ ${lw.length} stock bajo`);
  if(expired.length)msgs.push(`☠️ ${expired.length} producto(s) vencido(s)`);
  if(soon.length)msgs.push(`⏰ ${soon.length} por vencer pronto`);
  if(overdue.length)msgs.push(`💳 ${overdue.length} crédito(s) vencido(s)`);
  if(!msgs.length){el.style.display='none';return;}
  el.style.cssText='display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#fffbf0;border-bottom:2px solid #ffa72640;padding:9px 16px;';
  el.innerHTML=msgs.map(m=>`<span style="font-weight:700;color:#f57c00;font-size:13px">${m}</span>`).join(' · ')+
    `<button onclick="goTab('inventory')" style="background:#f57c00;color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px;font-weight:700;margin-left:auto">Ver →</button>`;
}


/* ═══════════════════ DASHBOARD ═══════════════════ */
function rDashboard(){
  const mon=S.sales.filter(s=>s.date.startsWith(today().slice(0,7)));
  const tod=S.sales.filter(s=>s.date===today());
  const rev=a=>a.reduce((s,x)=>s+x.total,0);
  const cst=a=>a.reduce((s,sale)=>s+sale.items.reduce((acc,it)=>{const p=S.products.find(p=>p.id===it.productId);return acc+(p?p.cost*it.qty:0);},0),0);
  const mRev=rev(mon),mCost=cst(mon),profit=mRev-mCost;
  const todGastos=S.gastos.filter(g=>g.fecha===today()).reduce((s,g)=>s+g.monto,0);
  const monGastos=S.gastos.filter(g=>g.fecha.startsWith(today().slice(0,7))).reduce((s,g)=>s+g.monto,0);
  const gananciaReal=profit-monGastos;
  const overdueC=S.creditos.filter(c=>c.status!=='pagado'&&c.dueDate<today());
  const pendingC=S.creditos.filter(c=>c.status!=='pagado');
  const totalPending=pendingC.reduce((s,c)=>s+(c.total-c.paid),0);
  const ls=S.products.filter(p=>p.stock<=p.minStock);
  const expired=S.products.filter(p=>p.expiry&&daysDiff(today(),p.expiry)<0);
  const sc=(ic,lb,vl,sb,cl='#0e9f8e')=>`<div class="stat-card" style="border-left:4px solid ${cl}">
    <div style="font-size:22px;margin-bottom:4px">${ic}</div>
    <div style="color:#9abfbb;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">${lb}</div>
    <div style="font-size:20px;font-weight:700;color:${cl};font-family:Georgia,serif">${vl}</div>
    ${sb?`<div style="color:#b2e0da;font-size:11px;margin-top:2px">${sb}</div>`:''}
  </div>`;
  const recSales=[...S.sales].reverse().slice(0,5).map(s=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e8f5f3">
      <div><div style="font-size:13px">${h(s.items.map(i=>i.name).join(', ').slice(0,36))}</div>
      <div style="font-size:11px;color:#9abfbb">${s.date} · ${s.payment}${s.isCredit?' · 💳 crédito':''}</div></div>
      <div style="font-weight:700;color:#0e9f8e">${fmt(s.total)}</div>
    </div>`).join('');
  return`<h2 style="color:#0e9f8e;font-family:Georgia,serif;margin-bottom:18px;font-size:22px">📊 Panel Principal</h2>
  <div class="grid4" style="margin-bottom:20px">
    ${sc('💰','Ventas hoy',fmt(rev(tod)),tod.length+' transacciones')}
    ${sc('📅','Ventas del mes',fmt(mRev),mon.length+' ventas')}
    ${sc('📈','Ganancia real',fmt(gananciaReal),'Ingresos − costos − gastos','#2e7d32')}
    ${sc('📤','Gastos del mes',fmt(monGastos),'Hoy: '+fmt(todGastos),'#e53935')}
    ${sc('💳','Cuentas por cobrar',fmt(totalPending),overdueC.length+' vencida(s)','#7b1fa2')}
    ${sc('📦','Productos',S.products.length,ls.length+' bajo stock','#0e9f8e')}
    ${sc('☠️','Vencidos',expired.length,'Revisar inventario',expired.length?'#e53935':'#2e7d32')}
    ${sc('👥','Clientes',S.clients.length,'Registrados','#0077b6')}
  </div>
  <div class="grid2">
    <div class="card"><h3 style="color:#0e9f8e;margin-bottom:12px;font-family:Georgia,serif;font-size:15px">🧾 Últimas Ventas</h3>
      ${S.sales.length?recSales:'<div style="color:#b2e0da;text-align:center;padding:18px">Sin ventas aún</div>'}
    </div>
    <div class="card"><h3 style="color:#f57c00;font-family:Georgia,serif;font-size:15px;margin-bottom:12px">⚠️ Alertas</h3>
      ${ls.length===0&&expired.length===0&&overdueC.length===0?'<div style="color:#2e7d32;text-align:center;padding:18px">✅ Todo en orden</div>':''}
      ${ls.map(p=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e8f5f3">
        <div style="font-size:13px">${h(p.name)}</div>
        <div>${p.stock===0?'<span class="badge-red">AGOT.</span>':'<span class="badge-orange">BAJO</span>'} <span style="font-weight:700;color:${p.stock===0?'#e53935':'#f57c00'}">${p.stock}</span></div>
      </div>`).join('')}
      ${expired.map(p=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e8f5f3">
        <div style="font-size:13px">${h(p.name)}</div><span class="badge-red">VENCIDO ${p.expiry}</span>
      </div>`).join('')}
      ${overdueC.map(c=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e8f5f3">
        <div style="font-size:13px">💳 ${h(c.clientName)}</div>
        <span class="badge-purple">Venc. ${c.dueDate}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

window.applyAudit=function(){

  S.products=S.products.map(p=>{

function getPriceForClient(product, clientId){
  if(!clientId)return product.price;
  const cl=S.clients.find(c=>c.id==clientId);
  if(!cl)return product.price;
  if(cl.tipo==='mayoreo'&&product.priceB)return product.priceB;
  if(cl.tipo==='especial'&&product.priceC)return product.priceC;
  return product.price;
}

window.addToCart=function(id){
  const p=S.products.find(p=>p.id===id);if(!p)return;
  const pr=getPriceForClient(p,S.saleClientId);
  const ex=S.cart.find(i=>i.productId===id);
  if(ex)S.cart=S.cart.map(i=>i.productId===id?{...i,qty:i.qty+1}:i);
  else S.cart=[...S.cart,{productId:p.id,name:p.name,qty:1,price:pr}];
  render();
};
window.updCart=function(id,qty){if(qty<=0)S.cart=S.cart.filter(i=>i.productId!==id);else S.cart=S.cart.map(i=>i.productId===id?{...i,qty}:i);render();};
window.completeSale=function(){
  if(!S.cart.length)return;
  const total=S.cart.reduce((s,i)=>s+i.qty*i.price,0);
  const tNum='TKT-'+S.tktCounter;S.tktCounter++;LS.set('mn:tkt',S.tktCounter);
  const dueDate=S.saleIsCredit?new Date(new Date(S.saleDate).getTime()+S.creditDays*86400000).toISOString().split('T')[0]:null;
  const sale={id:Date.now(),date:S.saleDate,items:[...S.cart],total,payment:S.saleIsCredit?'crédito':S.payment,clientId:S.saleClientId||null,ticketNum:tNum,isCredit:S.saleIsCredit,creditDays:S.creditDays,dueDate};
  S.sales=[...S.sales,sale];ss();
  S.products=S.products.map(p=>{const it=S.cart.find(i=>i.productId===p.id);return it?{...p,stock:Math.max(0,p.stock-it.qty)}:p;});sp();
  if(S.saleClientId){S.clients=S.clients.map(c=>c.id==S.saleClientId?{...c,purchases:[...(c.purchases||[]),sale.id]}:c);sc();}
  if(S.saleIsCredit&&S.saleClientId){
    const cl=S.clients.find(c=>c.id==S.saleClientId);
    S.creditos=[...S.creditos,{id:Date.now()+1,saleId:sale.id,clientId:S.saleClientId,clientName:cl?cl.name:'Desconocido',total,paid:0,dueDate,date:S.saleDate,ticketNum:tNum,status:'pendiente',abonos:[]}];
    scr();
  }
  S.cart=[];S.searchProd='';S.saleClientId='';S.saleIsCredit=false;
  set({showTicket:sale.id});
};
window.printTicket=function(id){const sale=S.sales.find(s=>s.id===id);if(!sale)return;const cl=S.clients.find(c=>c.id===sale.clientId);document.getElementById('print-area').innerHTML=buildTicketHTML(sale,cl);window.print();};
window.waTicket=function(id){
  const sale=S.sales.find(s=>s.id===id);if(!sale)return;
  const cl=S.clients.find(c=>c.id===sale.clientId);
  if(!cl||!cl.whatsapp){alert('Cliente sin WhatsApp registrado.');return;}
  const msg=[`🏪 *MiNegocio*`,`🎫 *${sale.ticketNum}*`,`📅 ${sale.date}`,``,`*Detalle:*`,...sale.items.map(i=>`• ${i.name} x${i.qty} — ${fmt(i.qty*i.price)}`),``,`💳 Pago: ${sale.isCredit?'CRÉDITO (vence '+sale.dueDate+')':sale.payment}`,`*💰 TOTAL: ${fmt(sale.total)}*`,``,`¡Gracias por tu compra! 🙌`].join('\n');
  window.open(`https://wa.me/${cl.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');
};

window.waBroadcastAll=function(){
  const msg=prompt('Mensaje para TODOS los clientes con WhatsApp:');if(!msg)return;
  const withWA=S.clients.filter(c=>c.whatsapp);
  if(!withWA.length){alert('Ningún cliente tiene WhatsApp registrado.');return;}
  withWA.forEach((c,i)=>setTimeout(()=>window.open(`https://wa.me/${c.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank'),i*800));
  alert(`Abriendo chat con ${withWA.length} cliente(s)...`);
};

window.applyAbono=function(){
  const amt=+S.abonoAmt;if(!amt||amt<=0)return alert('Ingresa un monto válido.');
  S.creditos=S.creditos.map(c=>{
    if(c.id!==S.showAbonoModal)return c;
    const newPaid=Math.min(c.total,c.paid+amt);
    return{...c,paid:newPaid,status:newPaid>=c.total?'pagado':'parcial',abonos:[...(c.abonos||[]),{date:today(),monto:amt}]};
  });
  scr();set({showAbonoModal:null,abonoAmt:''});
};

/* ═══════════════════ CAJA ═══════════════════ */
function rCaja(){
  const cortes=S.cajaCortes||[];
  const lastCorte=cortes.length?cortes[cortes.length-1]:null;
  const openSales=lastCorte?S.sales.filter(s=>s.id>(lastCorte.lastSaleId||0)):S.sales;
  const revM=(m)=>openSales.filter(s=>s.payment===m).reduce((a,s)=>a+s.total,0);
  const totEf=revM('efectivo'),totTar=revM('tarjeta'),totTra=revM('transferencia');
  const totVentas=openSales.reduce((a,s)=>a+s.total,0);
  const fondo=S.cajaFondo||0;
  const openDates=openSales.map(s=>s.date);
  const firstDate=openDates.length?openDates.reduce((a,b)=>a<b?a:b):'—';
  const lastDate=openDates.length?openDates.reduce((a,b)=>a>b?a:b):today();
  const period=openDates.length?(firstDate===lastDate?firstDate:`${firstDate} → ${lastDate}`):'Sin ventas';
  const monGastos=S.gastos.filter(g=>g.fecha.startsWith(today().slice(0,7))).reduce((s,g)=>s+g.monto,0);

  const fondoModal=S.cajaShowFondo?`<div class="modal-overlay" onclick="if(event.target===this)set({cajaShowFondo:false})">
    <div class="modal-box" style="border-top:4px solid #0e9f8e">
      <h3 style="color:#0e9f8e;font-family:Georgia,serif;margin-bottom:12px">💰 Fondo de Caja</h3>
      <input class="inp" type="number" value="${S.cajaFondo||''}" placeholder="Ej: 500" oninput="S.cajaFondo=+this.value" style="margin-bottom:14px"/>
      <div style="display:flex;gap:10px"><button onclick="LS.set('mn:fondo',S.cajaFondo);set({cajaShowFondo:false})" class="btn-primary" style="flex:1">Guardar</button><button onclick="set({cajaShowFondo:false})" class="btn-secondary" style="flex:1">Cancelar</button></div>
    </div></div>`:'';

  
  // Compute caja diffs
  const cajaDiffLines=[];

    </div></div>`:'';

  const histRows=[...cortes].reverse().map((c,i)=>`<tr>

  </tr>`).join('');

  return`<h2 style="color:#0e9f8e;font-family:Georgia,serif;font-size:22px;margin-bottom:14px">💵 Corte de Caja</h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px">
    <div class="stat-card" style="border-left:4px solid #0e9f8e"><div style="font-size:10px;color:#9abfbb;text-transform:uppercase;letter-spacing:1px">Período</div><div style="font-size:13px;font-weight:600;color:#0e9f8e">${period}</div><div style="font-size:11px;color:#b2e0da">${openSales.length} ventas</div></div>

    <div class="stat-card" style="border-left:4px solid #0077b6"><div style="font-size:10px;color:#9abfbb;text-transform:uppercase;letter-spacing:1px">💳 Tarjeta</div><div style="font-size:20px;font-weight:700;color:#0077b6;font-family:Georgia,serif">${fmt(totTar)}</div></div>

window.confirmarCorte=function(ef,tar,tra,tot,fondo,period){
  const notes=document.getElementById('corte-notes')?.value||'';
  const lastSaleId=S.sales.length?S.sales[S.sales.length-1].id:0;
  const lastCorte=S.cajaCortes&&S.cajaCortes.length?S.cajaCortes[S.cajaCortes.length-1]:null;
  const openSales=lastCorte?S.sales.filter(s=>s.id>(lastCorte.lastSaleId||0)):S.sales;
  const now=new Date();
  const corte={folio:'C-'+(1000+(S.cajaCortes||[]).length),date:today(),time:now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}),timestamp:Date.now(),period,efectivo:ef,tarjeta:tar,transferencia:tra,total:tot,fondo,ventas:openSales.length,lastSaleId,notes,conteo:S.cajaManual};
  S.cajaCortes=[...(S.cajaCortes||[]),corte];LS.set('mn:cortes',S.cajaCortes);S.cajaFondo=0;LS.set('mn:fondo',0);
  set({cajaShowCorte:false,cajaManual:{efectivo:'',tarjeta:'',transferencia:''}});
  setTimeout(()=>printCorteData(corte),400);
};

/* ═══════════════════ REPORTS ═══════════════════ */
function rReports(){
  const now=new Date(),per=S.rPeriod;
  const filSales=S.sales.filter(s=>{const d=new Date(s.date);
    if(per==='today')return s.date===today();
    if(per==='week'){const w=new Date();w.setDate(w.getDate()-7);return d>=w;}
    if(per==='month')return s.date.startsWith(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
    return true;});
  const rev=filSales.reduce((s,x)=>s+x.total,0);
  const cst=filSales.reduce((s,sale)=>s+sale.items.reduce((a,it)=>{const p=S.products.find(p=>p.id===it.productId);return a+(p?p.cost*it.qty:0);},0),0);
  const gastosPer=S.gastos.filter(g=>{
    if(per==='today')return g.fecha===today();
    if(per==='week'){const w=new Date();w.setDate(w.getDate()-7);return new Date(g.fecha)>=w;}
    if(per==='month')return g.fecha.startsWith(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
    return true;}).reduce((s,g)=>s+g.monto,0);
  const profit=rev-cst,gananciaReal=profit-gastosPer,margin=rev?Math.round((gananciaReal/rev)*100):0;
  const pSales={};filSales.forEach(s=>s.items.forEach(it=>{if(!pSales[it.productId])pSales[it.productId]={name:it.name,qty:0,revenue:0};pSales[it.productId].qty+=it.qty;pSales[it.productId].revenue+=it.qty*it.price;}));
  const top=Object.values(pSales).sort((a,b)=>b.revenue-a.revenue).slice(0,5);
  const byPmt={};filSales.forEach(s=>{byPmt[s.payment]=(byPmt[s.payment]||0)+s.total;});
  const byClient={};filSales.filter(s=>s.clientId).forEach(s=>{const cl=S.clients.find(c=>c.id==s.clientId);if(!cl)return;byClient[s.clientId]=(byClient[s.clientId]||{name:cl.name,total:0,count:0});byClient[s.clientId].total+=s.total;byClient[s.clientId].count++;});
  const topClients=Object.values(byClient).sort((a,b)=>b.total-a.total).slice(0,5);
  const daily=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const ds=d.toISOString().split('T')[0];return{date:ds.slice(5),revenue:S.sales.filter(s=>s.date===ds).reduce((s,x)=>s+x.total,0),gastos:S.gastos.filter(g=>g.fecha===ds).reduce((s,g)=>s+g.monto,0)};});
  const maxBar=Math.max(...daily.map(d=>d.revenue),1);
  const sc=(lb,vl,sb,cl)=>`<div class="stat-card" style="border-left:4px solid ${cl}"><div style="color:#9abfbb;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">${lb}</div><div style="font-size:19px;font-weight:700;color:${cl};font-family:Georgia,serif">${vl}</div>${sb?`<div style="color:#b2e0da;font-size:11px;margin-top:1px">${sb}</div>`:''}</div>`;

  // Compare with previous period
  const prevSales=S.sales.filter(s=>{
    if(per==='month'){const pm=new Date(now.getFullYear(),now.getMonth()-1,1);return s.date.startsWith(`${pm.getFullYear()}-${String(pm.getMonth()+1).padStart(2,'0')}`);}
    return false;});
  const prevRev=prevSales.reduce((s,x)=>s+x.total,0);
  const vsLast=prevRev?Math.round(((rev-prevRev)/prevRev)*100):null;

  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <h2 style="color:#0e9f8e;font-family:Georgia,serif;font-size:22px">📈 Reportes</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${[['today','Hoy'],['week','7 días'],['month','Mes'],['all','Todo']].map(([v,l])=>`<button onclick="S.rPeriod='${v}';render()" style="padding:7px 13px;border:${per===v?'none':'1.5px solid #b2e0da'};border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;background:${per===v?'#0e9f8e':'#fff'};color:${per===v?'#fff':'#7ab5ae'}">${l}</button>`).join('')}
    </div>
  </div>
  <div class="grid4" style="margin-bottom:16px">
    ${sc('Ingresos',fmt(rev),filSales.length+' ventas'+(vsLast!==null?' | '+(vsLast>=0?'+':'')+vsLast+'% vs mes ant.':''),'#0e9f8e')}
    ${sc('Costo',fmt(cst),'De productos vendidos','#7ab5ae')}
    ${sc('Gastos',fmt(gastosPer),'Del período','#e53935')}
    ${sc('Ganancia real',fmt(gananciaReal),'Margen: '+margin+'%',gananciaReal>=0?'#2e7d32':'#e53935')}
  </div>
  <div class="grid2" style="gap:14px">
    <div class="card"><h3 style="color:#0e9f8e;font-family:Georgia,serif;margin-bottom:12px;font-size:15px">Ventas vs Gastos (7 días)</h3>
      <div style="display:flex;align-items:flex-end;gap:5px;height:110px">
        ${daily.map(d=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
          <div style="width:100%;display:flex;flex-direction:column;align-items:stretch;gap:1px;height:${Math.max(3,(d.revenue/maxBar)*88)}px">
            <div style="flex:1;background:#0e9f8e;border-radius:3px 3px 0 0"></div>
            ${d.gastos>0?`<div style="height:${Math.min(100,(d.gastos/Math.max(d.revenue,1))*100)}%;background:#e53935;min-height:2px;border-radius:0"></div>`:''}
          </div>
          <div style="font-size:9px;color:#9abfbb">${d.date}</div>
        </div>`).join('')}
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;font-size:11px"><span style="color:#0e9f8e">■ Ventas</span><span style="color:#e53935">■ Gastos</span></div>
    </div>
    <div class="card"><h3 style="color:#0e9f8e;font-family:Georgia,serif;margin-bottom:12px;font-size:15px">Top Productos</h3>
      ${top.length?top.map((p,i)=>`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:13px">#${i+1} ${h(p.name)}</span><span style="font-size:13px;font-weight:700;color:#0e9f8e">${fmt(p.revenue)}</span></div>
        <div style="background:#e0f5f2;border-radius:3px;height:4px"><div style="background:#0e9f8e;height:100%;border-radius:3px;width:${(p.revenue/top[0].revenue)*100}%"></div></div>
        <div style="font-size:11px;color:#9abfbb">${p.qty} uds</div>
      </div>`).join(''):'<div style="color:#b2e0da;text-align:center;padding:14px">Sin datos</div>'}
    </div>
    <div class="card"><h3 style="color:#0e9f8e;font-family:Georgia,serif;margin-bottom:12px;font-size:15px">Formas de Pago</h3>
      ${Object.keys(byPmt).length?Object.entries(byPmt).map(([m,amt])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e0f5f2">
        <span>${m==='efectivo'?'💵':m==='tarjeta'?'💳':m==='crédito'?'📋':'📲'} <span style="text-transform:capitalize">${m}</span></span>
        <div style="text-align:right"><div style="font-weight:700;color:#0e9f8e">${fmt(amt)}</div><div style="font-size:11px;color:#9abfbb">${rev?Math.round((amt/rev)*100):0}%</div></div>
      </div>`).join(''):'<div style="color:#b2e0da;text-align:center;padding:14px">Sin datos</div>'}
    </div>
    <div class="card"><h3 style="color:#0e9f8e;font-family:Georgia,serif;margin-bottom:12px;font-size:15px">Top Clientes</h3>
      ${topClients.length?topClients.map((c,i)=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e0f5f2">
        <span style="font-size:13px">#${i+1} ${h(c.name)}</span>
        <div style="text-align:right"><div style="font-weight:700;color:#0077b6">${fmt(c.total)}</div><div style="font-size:11px;color:#9abfbb">${c.count} compras</div></div>
      </div>`).join(''):'<div style="color:#b2e0da;text-align:center;padding:14px">Sin clientes</div>'}
    </div>
    <div class="card"><h3 style="color:#0e9f8e;font-family:Georgia,serif;margin-bottom:12px;font-size:15px">Valor del Inventario</h3>
      <div class="grid2" style="margin-bottom:10px">
        <div style="background:#f0faf8;border-radius:9px;padding:12px;text-align:center"><div style="font-size:11px;color:#9abfbb">A costo</div><div style="font-size:17px;font-weight:700;color:#7ab5ae">${fmt(S.products.reduce((s,p)=>s+p.cost*p.stock,0))}</div></div>
        <div style="background:#e0f5f2;border-radius:9px;padding:12px;text-align:center"><div style="font-size:11px;color:#9abfbb">A precio venta</div><div style="font-size:17px;font-weight:700;color:#0e9f8e">${fmt(S.products.reduce((s,p)=>s+p.price*p.stock,0))}</div></div>
      </div>
      <div style="font-size:12px;color:#9abfbb;text-align:center">${S.products.length} productos · ${S.products.reduce((s,p)=>s+p.stock,0)} uds</div>
    </div>
    <div class="card"><h3 style="color:#0e9f8e;font-family:Georgia,serif;margin-bottom:12px;font-size:15px">Ticket Promedio</h3>
      <div style="font-size:32px;font-weight:700;color:#0e9f8e;font-family:Georgia,serif;text-align:center;padding:16px 0">${filSales.length?fmt(rev/filSales.length):'$0'}</div>
      <div style="font-size:12px;color:#9abfbb;text-align:center">Por venta en el período</div>
      ${vsLast!==null?`<div style="text-align:center;margin-top:8px"><span style="font-size:13px;font-weight:700;color:${vsLast>=0?'#2e7d32':'#e53935'}">${vsLast>=0?'↑':'↓'} ${Math.abs(vsLast)}% vs mes anterior</span></div>`:''}
    </div>
  </div>`;
}

    </div></div>`;
}
window.openBarcodeScanner=function(target){S.scannerTarget=target;S.scannerOpen=true;render();setTimeout(()=>startCamera(),300);};
window.closeScanner=function(){stopCamera();S.scannerOpen=false;render();};
function stopCamera(){if(S.scannerStream){S.scannerStream.getTracks().forEach(t=>t.stop());S.scannerStream=null;}if(window._scanInterval){clearInterval(window._scanInterval);window._scanInterval=null;}}
async function startCamera(){
  try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});S.scannerStream=stream;const video=document.getElementById('scanner-video');if(!video){stopCamera();return;}video.srcObject=stream;await video.play();startDecode(video);}
  catch(e){const el=document.getElementById('scan-result');if(el)el.innerHTML='<span style="color:#e53935">⚠️ Sin acceso a cámara. Usa el campo manual.</span>';}
}
function startDecode(video){
  const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');
  window._scanInterval=setInterval(async()=>{
    if(!video.videoWidth)return;canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0);
    if('BarcodeDetector' in window){try{const bd=new BarcodeDetector();const codes=await bd.detect(canvas);if(codes.length>0){handleScan(codes[0].rawValue);return;}}catch(e){}}
  },400);
}
function handleScan(code){stopCamera();const el=document.getElementById('scan-result');if(el)el.innerHTML=`<span style="color:#2e7d32;font-weight:700">✅ ${code}</span>`;setTimeout(()=>applyScan(code),400);}
function applyScan(code){
  S.scannerOpen=false;
  if(S.scannerTarget==='sales'){
    const p=S.products.find(p=>(p.barcode&&p.barcode===code)||(p.sku&&p.sku===code));
    if(p){if(p.stock<=0){alert(p.name+' sin stock.');render();return;}addToCart(p.id);}
    else{S.searchProd=code;render();setTimeout(()=>alert('No encontrado: '+code),200);}
  }else if(S.scannerTarget==='form'){S.invForm.barcode=code;render();}
}
window.applyManualBarcode=function(){const inp=document.getElementById('manual-barcode-inp');if(!inp||!inp.value.trim())return;handleScan(inp.value.trim());};


// Safety wrapper
try {
  render();
} catch(e) {
  document.getElementById('main-content').innerHTML = 
    '<div style="padding:20px;color:#e53935;font-family:monospace;font-size:12px">' +
    '<b>Error:</b> ' + e.message + '<br/><br/>' + e.stack + '</div>';
  console.error('Render error:', e);
}
</script>
